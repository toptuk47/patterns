<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учет успеваемости</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 650px;
        margin: 30px auto;
        padding: 0 15px;
      }
      h1 {
        margin-bottom: 0.3em;
      }
      .subtitle {
        color: #444;
        margin-bottom: 1.5em;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 15px;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
      .status {
        font-weight: bold;
        color: #c00;
      }
      button {
        padding: 6px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .deadline-btn {
        background: #007acc;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        margin-bottom: 20px;
      }
      #log {
        background: #fafafa;
        border: 1px solid #ddd;
        padding: 10px;
        min-height: 60px;
        max-height: 200px;
        overflow-y: auto;
        font-size: 14px;
      }
      #log p {
        margin: 5px 0;
        color: #a00;
      }
    </style>
  </head>
  <body>
    <h1>Учет текущей успеваемости</h1>

    <table>
      <thead>
        <tr>
          <th>Преподаватель</th>
          <th>Статус</th>
          <th>Действие</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Иванов</td>
          <td id="status-Иванов" class="status">Ожидается</td>
          <td><button id="btn-Иванов">Сдать отчет</button></td>
        </tr>
        <tr>
          <td>Петрова</td>
          <td id="status-Петрова" class="status">Ожидается</td>
          <td><button id="btn-Петрова">Сдать отчет</button></td>
        </tr>
        <tr>
          <td>Сидоров</td>
          <td id="status-Сидоров" class="status">Ожидается</td>
          <td><button id="btn-Сидоров">Сдать отчет</button></td>
        </tr>
      </tbody>
    </table>

    <button id="deadline-btn" class="deadline-btn">Наступил дедлайн</button>

    <h3>Оповещения деканата</h3>
    <div id="log"></div>

    <script type="module" src="src/lab_6/main.ts"></script>
  </body>
</html>
